format_version = 1
release = "20260515.1"
title = "Gaia-HIP supplemental display de-duplication map"
status = "release-candidate"

[summary]
description = "Found-In-Space supplemental Gaia-Hipparcos2 display de-duplication map, with source-download and match-policy evidence."

[inputs]
hipparcos_catalog = "Vizier I/311/hip2"
