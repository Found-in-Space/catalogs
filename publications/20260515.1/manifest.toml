gaia_photometry_source = "gaiadr3.gaia_source"
local_scratch_root = "local/runs/source-20260515.1"

[outputs]
supplemental_display_map = "catalog/fis_gaia_hip_supplemental_display_map.parquet"
display_match_evidence = "evidence/gaia_hip_display_match_evidence.parquet"
display_match_report = "evidence/gaia_hip_display_match_report.json"
gaia_parallax_download_query = "evidence/gaia_g15_parallax_download.adql"
gaia_parallax_download_state = "evidence/gaia_g15_parallax_download_state.json"
gaia_parallax_conversion_summary = "evidence/gaia_g15_parallax_conversion_summary.json"
magnitude_relationship_plot = "evidence/hip_gaia_magnitude_relationship.png"
